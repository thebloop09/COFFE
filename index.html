<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Coffee Cafe</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-mug-hot"></i> Cafe
            </div>
            <ul class="nav-links">
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li class="user-menu-wrapper">
                    <a href="login.html" id="userMenuToggle" class="user-menu-toggle" aria-expanded="false" aria-haspopup="true">
                        <i class="fa-solid fa-user"></i>
                    </a>
                    <div id="userDropdown" class="user-dropdown hidden" role="menu">
                        <button type="button" class="dropdown-item" data-action="profile">Xem profile</button>
                        <button type="button" class="dropdown-item" data-action="orders">Đơn hàng</button>
                        <button type="button" class="dropdown-item logout" data-action="logout">Đăng xuất</button>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1>Bắt đầu ngày với một tách đen đá không đường...</h1>
            <button class="btn-buy">Mua ngay</button>
        </div>
        <div class="hero-image">
            <!-- Thay bằng ảnh ly cafe tách nền của bạn -->
            <img src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?q=80&w=500" alt="Coffee Cup">
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <script>
        const userMenuToggle = document.getElementById('userMenuToggle');
        const userDropdown = document.getElementById('userDropdown');
        const dropdownItems = document.querySelectorAll('.dropdown-item');

        function closeDropdown() {
            userDropdown.classList.add('hidden');
            userMenuToggle.setAttribute('aria-expanded', 'false');
        }

        function openDropdown() {
            userDropdown.classList.remove('hidden');
            userMenuToggle.setAttribute('aria-expanded', 'true');
        }

        async function renderAuthUI() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();

            if (user) {
                const displayName = user.user_metadata?.full_name || user.email || 'U';
                const initial = displayName.toString().trim().charAt(0).toUpperCase();

                userMenuToggle.href = '#';
                userMenuToggle.innerHTML = `<span class="avatar-circle">${initial}</span>`;
                userMenuToggle.classList.add('avatar-button');
                userMenuToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    const isHidden = userDropdown.classList.contains('hidden');
                    if (isHidden) {
                        openDropdown();
                    } else {
                        closeDropdown();
                    }
                });
            } else {
                userMenuToggle.href = 'login.html';
                userMenuToggle.innerHTML = '<i class="fa-solid fa-user"></i>';
                userMenuToggle.classList.remove('avatar-button');
                closeDropdown();
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu-wrapper')) {
                closeDropdown();
            }
        });

        dropdownItems.forEach((item) => {
            item.addEventListener('click', async () => {
                const action = item.getAttribute('data-action');
                closeDropdown();

                if (action === 'logout') {
                    await window.supabaseClient.auth.signOut();
                    window.location.href = 'login.html';
                } else if (action === 'profile') {
                    alert('Tính năng xem profile sẽ được cập nhật sau.');
                } else if (action === 'orders') {
                    alert('Tính năng đơn hàng sẽ được cập nhật sau.');
                }
            });
        });

        renderAuthUI();

        window.supabaseClient.auth.onAuthStateChange(() => {
            renderAuthUI();
        });
    </script>
</body>
</html>
