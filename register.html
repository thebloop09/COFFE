<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Coffee Management</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Coffee Management System</h1>
            <h3>Đăng ký</h3>
            <form id="registerForm">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input id="name" type="text" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input id="email" type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" type="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input id="confirmPassword" type="password" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn-submit">Đăng ký</button>
                <p id="message" style="margin-top: 12px; color: #0f766e;"></p>
            </form>
            <p class="auth-footer">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const messageBox = document.getElementById('message');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                messageBox.textContent = 'Mật khẩu xác nhận không khớp.';
                messageBox.style.color = '#b91c1c';
                return;
            }

            messageBox.textContent = 'Đang xử lý...';
            messageBox.style.color = '#0f766e';

            const redirectUrl = (window.location.origin && window.location.origin !== 'null')
                ? window.location.origin + '/login.html'
                : 'http://localhost:5500/login.html';

            const { data, error } = await window.supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: name
                    },
                    emailRedirectTo: redirectUrl
                }
            });

            if (error) {
                messageBox.textContent = error.message;
                messageBox.style.color = '#b91c1c';
                return;
            }

            if (data?.user && !data.session) {
                messageBox.textContent = 'Đăng ký thành công! Vui lòng kiểm tra email để xác thực tài khoản.';
                messageBox.style.color = '#0f766e';
            } else {
                messageBox.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                messageBox.style.color = '#0f766e';
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
